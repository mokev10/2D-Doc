name: Generate DataMatrix PNGs

on:
  push:
    branches: [ main ]

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libdmtx-dev libjpeg-dev zlib1g-dev python3-dev

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install pylibdmtx Pillow

      - name: Generate DataMatrix PNGs
        run: |
          python scripts/generate_datamatrix.py

      - name: Commit generated images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add static/datamatrix || true
          git commit -m "chore: regenerate datamatrix images" || echo "no changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
