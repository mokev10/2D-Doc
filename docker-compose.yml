version: "3.8"

services:
  2ddoc-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: 2ddoc-app:latest
    container_name: 2ddoc-app
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    # In development you can mount the source to see live changes.
    # Remove the volumes section in production to use the image contents only.
    volumes:
      - ./:/app:cached
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8501 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
